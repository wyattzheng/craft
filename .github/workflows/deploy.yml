name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build client
        run: pnpm --filter blokk-client build
        env:
          VITE_WS_URL: ws://${{ secrets.HOST }}:9000

      - name: Deploy client to Cloudflare Pages
        run: npx wrangler pages deploy packages/blokk-client/dist --project-name=blokk
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Build server
        run: pnpm --filter blokk-server build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Deploy server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.HOST }} "mkdir -p /app/server"
          scp -i ~/.ssh/deploy_key -r packages/blokk-server/dist/* ${{ secrets.SSH_USER }}@${{ secrets.HOST }}:/app/server/

      - name: Setup & Restart server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.HOST }} << 'EOF'
            export PATH=$PATH:/usr/local/bin:$HOME/.local/bin
            if ! command -v node &>/dev/null; then
              curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -
              yum install -y nodejs
            fi
            if ! command -v pm2 &>/dev/null; then
              npm install -g pm2
              pm2 startup
            fi
            pm2 restart blokk-server || pm2 start /app/server/main.js --name blokk-server
            pm2 save
          EOF
